name: Code Quality

on:
  workflow_call:

jobs:
  code-check:
    runs-on: ubuntu-latest
    steps:
      - name: Code check
        uses: actions/checkout@v5

      - name: setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install ESLint
        run: npm install -g eslint

      - name: Run ESlint
        run: eslint app.js
